<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSumize - Login</title>
    <link rel="stylesheet" href="loginStyle.css" />
    <script type="module" src="../../app.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="../../../../../assets/LogoWebSumize.ico" alt="WebSumize Logo" />
      </div>
      <div class="form">
        <form>
          <h1>Welcome to WebSumize</h1>
          <br />
          <br />
          <h2>Login to continue</h2>
          <input
            type="text"
            name=""
            placeholder="Enter username"
            id="username"
          />

          <input
            type="password"
            name=""
            placeholder="Enter Password"
            id="password"
          />
          <input
            type="text"
            name=""
            placeholder="Enter School name"
            id="schoolName"
          />
          <input
            type="text"
            name=""
            placeholder="Enter school URL"
            id="schoolUrl"
          />
          
          <button id="loginButton">LOGIN</button>
        </form>
      </div>
    </div>
    <script src="loginScript.js"></script>
  </body>
</html>
